version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentendar_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgres://sentendar_user:sentendar_pass@db:5432/sentendar_db
      - JWT_SECRET=secret_sentendar_key_2024
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sentendar_network

  db:
    image: postgres:15-alpine
    container_name: sentendar_db
    restart: always
    environment:
      POSTGRES_USER: sentendar_user
      POSTGRES_PASSWORD: sentendar_pass
      POSTGRES_DB: sentendar_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentendar_user -d sentendar_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentendar_network

networks:
  sentendar_network:
    driver: bridge

volumes:
  db_data:
